name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        run: |
          mapfile -t scripts < <(
            {
              git ls-files '*.sh' '*.bash'
              git grep -lE '^#!.*\b(bash|sh)\b' -- ':!*.sh' ':!*.bash'
            } | sort -u
          )
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found."; exit 0
          fi
          printf 'Linting %d script(s):\n' "${#scripts[@]}"
          printf '  %s\n' "${scripts[@]}"
          shellcheck "${scripts[@]}"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit
      - name: Bandit (warn on medium severity)
        run: uv run bandit -c pyproject.toml -r src -ll --exit-zero
      - name: Bandit (fail on high severity)
        run: uv run bandit -c pyproject.toml -r src -lll

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run pytest
