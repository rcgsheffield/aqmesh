name: Link check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline: skip all network requests, only validate local file links.
          # --include-fragments: also verify #section-anchors resolve to a heading.
          args: --offline --include-fragments --verbose '**/*.md'
          fail: true
