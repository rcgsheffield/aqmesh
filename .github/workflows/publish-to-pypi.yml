name: Publish aqmesh-client to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'aqmesh-client-v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv build --package aqmesh-client --out-dir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
