name: Publish aqmesh-client to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "aqmesh-client release tag to publish (e.g. aqmesh-client-v0.2.0)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'aqmesh-client-v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv build --package aqmesh-client --out-dir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
