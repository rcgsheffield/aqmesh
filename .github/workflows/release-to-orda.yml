name: Release to ORDA

# Archive each published GitHub Release in ORDA (the University of Sheffield's
# institutional repository), which mints/versions a DataCite DOI so the pipeline
# can be cited in papers. See docs/publish.md for the one-time setup.
#
# This job is gated on the FIGSHARE_ARTICLE_ID repository variable, so it stays
# dormant (and never fails) until that variable and the FIGSHARE_TOKEN secret are
# configured in the repo settings.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to archive (e.g. v0.1.4)'
        required: true

permissions:
  contents: read

jobs:
  upload:
    if: vars.FIGSHARE_ARTICLE_ID != ''
    runs-on: ubuntu-24.04
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
      ARCHIVE_NAME: ${{ github.event.repository.name }}-${{ github.event.release.tag_name || inputs.tag_name }}
    steps:
      - name: Download release archives
        run: |
          mkdir data
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip" > "data/${ARCHIVE_NAME}.zip"
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" > "data/${ARCHIVE_NAME}.tar.gz"

      - name: Upload to ORDA (Figshare)
        env:
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_TOKEN }}
          FIGSHARE_ARTICLE_ID: ${{ vars.FIGSHARE_ARTICLE_ID }}
          FIGSHARE_ENDPOINT: https://api.figshare.com/v2
        run: |
          for FILE in data/*; do
            NAME=$(basename "$FILE")
            SIZE=$(wc -c < "$FILE")
            MD5=$(md5sum "$FILE" | cut -d' ' -f1)

            # 1. Initiate upload
            LOCATION=$(curl -sf \
              -H "Authorization: token $FIGSHARE_TOKEN" \
              -H "Content-Type: application/json" \
              -X POST "${FIGSHARE_ENDPOINT}/account/articles/${FIGSHARE_ARTICLE_ID}/files" \
              -d "{\"name\":\"${NAME}\",\"size\":${SIZE},\"md5\":\"${MD5}\"}" \
              | jq -r '.location')

            # 2. Get upload URL
            UPLOAD_URL=$(curl -sf \
              -H "Authorization: token $FIGSHARE_TOKEN" \
              "$LOCATION" | jq -r '.upload_url')

            # 3. Upload parts (single part for typical release archives)
            PARTS=$(curl -sf "$UPLOAD_URL")
            PART_COUNT=$(echo "$PARTS" | jq '.parts | length')
            for i in $(seq 0 $((PART_COUNT - 1))); do
              PART_URL=$(echo "$PARTS" | jq -r ".parts[$i].uploadUrl")
              PART_FROM=$(echo "$PARTS" | jq -r ".parts[$i].startOffset")
              PART_TO=$(echo "$PARTS" | jq -r ".parts[$i].endOffset")
              dd if="$FILE" bs=1 skip="$PART_FROM" count=$((PART_TO - PART_FROM + 1)) 2>/dev/null \
                | curl -sf -X PUT "$PART_URL" --data-binary @-
            done

            # 4. Complete upload
            curl -sf \
              -H "Authorization: token $FIGSHARE_TOKEN" \
              -X POST "${LOCATION}/complete"
          done
