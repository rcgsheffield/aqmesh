name: Release to ORDA

# Archive each published GitHub Release in ORDA (the University of Sheffield's
# institutional repository), which mints/versions a DataCite DOI so the pipeline
# can be cited in papers. See docs/publish.md for the one-time setup.
#
# This job is gated on the FIGSHARE_ARTICLE_ID repository variable, so it stays
# dormant (and never fails) until that variable and the FIGSHARE_TOKEN secret are
# configured in the repo settings. It also skips aqmesh-client-vX.Y.Z releases —
# the ORDA item is for the pipeline, not the standalone client library.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to archive (e.g. v0.1.4)'
        required: true

permissions:
  contents: read

jobs:
  upload:
    if: vars.FIGSHARE_ARTICLE_ID != '' && !startsWith(github.event.release.tag_name || inputs.tag_name, 'aqmesh-client-v')
    runs-on: ubuntu-24.04
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
      ARCHIVE_NAME: ${{ github.event.repository.name }}-${{ github.event.release.tag_name || inputs.tag_name }}
    steps:
      - name: Download release archives
        run: |
          mkdir data
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip" > "data/${ARCHIVE_NAME}.zip"
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" > "data/${ARCHIVE_NAME}.tar.gz"

      - name: Upload to ORDA (Figshare)
        uses: figshare/github-upload-action@v1.1
        with:
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_TOKEN }}
          FIGSHARE_ENDPOINT: 'https://api.figshare.com/v2'
          FIGSHARE_ARTICLE_ID: ${{ vars.FIGSHARE_ARTICLE_ID }}
          DATA_DIR: 'data'
