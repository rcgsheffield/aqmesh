name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - "deploy/**"
      - "**/*.sh"
      - "**/*.bash"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "deploy/**"
      - "**/*.sh"
      - "**/*.bash"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        run: |
          mapfile -t scripts < <(
            {
              git ls-files '*.sh' '*.bash'
              git grep -lE '^#!.*\b(bash|sh)\b' -- ':!*.sh' ':!*.bash'
            } | sort -u
          )
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found."; exit 0
          fi
          printf 'Linting %d script(s):\n' "${#scripts[@]}"
          printf '  %s\n' "${scripts[@]}"
          shellcheck "${scripts[@]}"
