[project]
name = "aqmesh"
version = "0.2.1"
description = "Dependency-light client for the AQMesh REST API."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Joe Heffer", email = "j.heffer@sheffield.ac.uk" }]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.14.2",
]

[project.scripts]
aqmesh-client = "aqmesh_client.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aqmesh_client"]
